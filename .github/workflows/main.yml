name: Sync
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://github.com repo
          cd repo
          git push --force https://nickClickCasas:$HF_TOKEN@huggingface.co/spaces/nickClickCasas/deepsite-project-rzbtu main
